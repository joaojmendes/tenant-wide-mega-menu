name: Feature request
description: Suggest an improvement for Tenant Wide Mega Menu
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe the user or administrator need rather than only the proposed UI.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: audience
    attributes:
      label: Primary audience
      options:
        - Ordinary users
        - Menu managers
        - SharePoint administrators
        - Microsoft 365 administrators
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and did not find the same request.
          required: true

